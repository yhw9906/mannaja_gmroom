<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Macro_STREAMS_Logic.xlsx</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; background-color: #ffffff; }
        .cell-border { border-right: 1px solid #e2e3e3; border-bottom: 1px solid #e2e3e3; }
        .row-hover:hover { background-color: #f1f3f4; }
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 0px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
        .chat-bubble { border-radius: 0px; border-left: 3px solid #1a73e8; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-[#333333] h-[100dvh] w-screen overflow-hidden flex flex-col bg-[#f8f9fa]">

    <div id="toast" class="fixed bottom-16 right-6 bg-[#323232] text-white px-4 py-2 opacity-0 transition-all z-[300] pointer-events-none text-xs w-max text-left shadow-md">시스템 알림</div>

    <div id="modal-room-manage" class="hidden fixed inset-0 bg-white/80 flex items-center justify-center z-[200]"><div class="bg-white border border-[#ccc] shadow-lg w-full max-w-sm p-0 text-sm"><div class="bg-[#f1f3f4] border-b border-[#ccc] px-4 py-2 font-bold text-[#333]">도구 (관리)</div><div class="p-4 flex flex-col gap-2"><button onclick="openMemberManage()" class="border border-[#ccc] py-1.5 px-3 hover:bg-[#f1f3f4] text-left">참여자 권한 관리</button><button onclick="handleShareRoom()" class="border border-[#ccc] py-1.5 px-3 hover:bg-[#f1f3f4] text-left">공유 링크 복사</button><button onclick="openRenameModal()" class="border border-[#ccc] py-1.5 px-3 hover:bg-[#f1f3f4] text-left">시트 이름 변경</button><div class="border-t border-[#ccc] mt-2 pt-2"><button onclick="confirmDeleteRoom()" class="border border-[#ccc] bg-[#fce8e6] text-[#c5221f] py-1.5 px-3 hover:bg-[#fad2cf] w-full text-left">데이터 영구 삭제 (폭파)</button></div></div><div class="bg-[#f1f3f4] border-t border-[#ccc] px-4 py-2 text-right"><button onclick="closeRoomManage()" class="bg-white border border-[#ccc] px-4 py-1 hover:bg-gray-50">닫기</button></div></div></div>
    <div id="modal-member-list" class="hidden fixed inset-0 bg-white/80 flex items-center justify-center z-[210]"><div class="bg-white border border-[#ccc] shadow-lg w-full max-w-sm p-0 text-sm"><div class="bg-[#f1f3f4] border-b border-[#ccc] px-4 py-2 font-bold text-[#333]">참여자 권한 관리</div><div id="member-manage-list" class="p-4 max-h-60 overflow-y-auto space-y-1"></div><div class="bg-[#f1f3f4] border-t border-[#ccc] px-4 py-2 text-right"><button onclick="closeMemberManage()" class="bg-white border border-[#ccc] px-4 py-1 hover:bg-gray-50">닫기</button></div></div></div>
    <div id="modal-rename" class="hidden fixed inset-0 bg-white/80 flex items-center justify-center z-[220]"><div class="bg-white border border-[#ccc] shadow-lg w-full max-w-sm p-0 text-sm"><div class="bg-[#f1f3f4] border-b border-[#ccc] px-4 py-2 font-bold text-[#333]">시트 이름 변경</div><div class="p-4"><input type="text" id="renameInput" class="w-full p-2 border border-[#ccc] outline-none focus:border-[#1a73e8]"></div><div class="bg-[#f1f3f4] border-t border-[#ccc] px-4 py-2 text-right flex justify-end gap-2"><button onclick="closeRenameModal()" class="bg-white border border-[#ccc] px-4 py-1 hover:bg-gray-50">취소</button><button onclick="handleRenameRoom()" class="bg-[#1a73e8] text-white border border-[#1a73e8] px-4 py-1 hover:bg-[#1557b0]">적용</button></div></div></div>
    <div id="modal-confirm" class="hidden fixed inset-0 bg-white/80 flex items-center justify-center z-[230]"><div class="bg-white border border-[#ccc] shadow-lg w-full max-w-sm p-0 text-sm"><div class="bg-[#fce8e6] border-b border-[#ccc] px-4 py-2 font-bold text-[#c5221f]">시스템 경고</div><div class="p-6"><p id="confirm-message" class="text-[#333] whitespace-pre-line"></p></div><div class="bg-[#f1f3f4] border-t border-[#ccc] px-4 py-2 text-right flex justify-end gap-2"><button onclick="closeConfirmModal()" class="bg-white border border-[#ccc] px-4 py-1 hover:bg-gray-50">취소</button><button id="btn-confirm-action" class="bg-[#c5221f] text-white border border-[#c5221f] px-4 py-1 hover:bg-[#a50e0e]">확인</button></div></div></div>

    <div id="screen-color" class="hidden flex-1 items-center justify-center bg-[#f8f9fa]"><div class="bg-white border border-[#ccc] shadow-sm p-6 w-full max-w-sm"><h2 class="text-sm font-bold text-[#333] mb-4 border-b pb-2">작업자 레이블 색상 할당</h2><div id="color-grid" class="grid grid-cols-5 gap-2 mb-4"></div><button onclick="goToLobby()" class="text-xs text-[#1a73e8] underline">세션 종료 (로비로)</button></div></div>

    <div id="screen-game" class="hidden flex-col h-full w-full">
        
        <div class="bg-[#f8f9fa] border-b border-[#e2e3e3] px-2 md:px-4 py-2 flex items-center gap-2 md:gap-3 flex-shrink-0">
            <div class="w-7 h-7 md:w-8 md:h-8 bg-[#0f9d58] text-white flex items-center justify-center font-bold text-base md:text-lg cursor-pointer hover:opacity-90 flex-shrink-0" title="로비로 이동" onclick="goToLobby()">S</div>
            <div class="flex-1 overflow-hidden whitespace-nowrap">
                <div class="text-xs md:text-sm text-[#333] font-medium truncate" id="room-info-display">Loading...</div>
                <div class="text-[10px] md:text-[11px] text-[#5f6368] flex gap-2 md:gap-4 mt-0.5 md:mt-1">
                    <span class="hover:bg-[#e8eaed] px-1 rounded cursor-pointer hidden md:inline">파일</span>
                    <span class="hover:bg-[#e8eaed] px-1 rounded cursor-pointer hidden md:inline">수정</span>
                    <span class="hover:bg-[#e8eaed] px-1 rounded cursor-pointer hidden md:inline">보기</span>
                    <span class="hover:bg-[#e8eaed] px-1 rounded cursor-pointer hidden md:inline">데이터</span>
                    <span class="hover:bg-[#e8eaed] px-1 rounded cursor-pointer text-[#1a73e8]" onclick="openRoomManage()">도구(관리)</span>
                </div>
            </div>
            <button onclick="handleShareRoom()" class="bg-[#e8f0fe] text-[#1a73e8] px-3 md:px-4 py-1.5 text-[10px] md:text-[11px] font-bold border border-[#d2e3fc] hover:bg-[#d2e3fc] whitespace-nowrap flex-shrink-0">공유</button>
        </div>

        <div class="flex items-center border-b border-[#e2e3e3] bg-white flex-shrink-0 text-xs md:text-sm">
            <div class="w-8 md:w-10 flex justify-center items-center text-[#5f6368] font-serif italic border-r border-[#e2e3e3] py-1 bg-[#f8f9fa] flex-shrink-0">fx</div>
            <div id="display-theme" class="flex-1 px-3 py-1 text-[#1a73e8] font-mono font-bold outline-none truncate">데이터 로딩 중...</div>
        </div>

        <div class="flex-1 flex flex-col md:flex-row overflow-hidden bg-white">
            
            <div class="flex-1 flex flex-col md:border-r border-[#e2e3e3] overflow-x-auto overflow-y-auto bg-white relative">
                <div id="grid-header" class="flex bg-[#f8f9fa] border-b border-[#e2e3e3] text-[10px] md:text-[11px] text-[#5f6368] font-medium sticky top-0 z-20 min-w-max"></div>
                <div id="card-slots" class="flex-col w-full text-[11px] md:text-[12px] min-w-max"></div>
            </div>

            <div class="h-1/3 md:h-full w-full md:w-72 bg-white flex flex-col flex-shrink-0 border-t md:border-t-0 border-[#e2e3e3]">
                <div class="p-1.5 md:p-2 border-b border-[#e2e3e3] bg-[#f8f9fa] text-[10px] md:text-[11px] text-[#5f6368] font-medium">
                    <span>메모 이력 (Log)</span>
                </div>
                <div id="chat-messages" class="flex-1 overflow-y-auto p-2 md:p-3 space-y-2 bg-white text-[10px] md:text-[11px]"></div>
                <div class="p-1.5 md:p-2 border-t border-[#e2e3e3] bg-[#f8f9fa]">
                    <form onsubmit="handleChatSubmit(event)" class="flex gap-1.5 md:gap-2 m-0">
                        <input type="text" id="chat-input" placeholder="메모 추가..." autocomplete="off" class="flex-1 px-2 py-1 bg-white border border-[#ccc] outline-none focus:border-[#1a73e8] text-[10px] md:text-[11px]">
                        <button type="submit" class="bg-[#f1f3f4] text-[#333] border border-[#ccc] px-2 md:px-3 py-1 text-[10px] md:text-[11px] hover:bg-[#e8eaed] whitespace-nowrap">입력</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="bg-[#f8f9fa] border-t border-[#e2e3e3] flex items-center justify-between px-2 flex-shrink-0 text-[10px] md:text-[11px] overflow-x-auto no-scrollbar" style="padding-bottom: env(safe-area-inset-bottom);">
            <div class="flex items-center flex-shrink-0">
                <div class="px-2 py-1.5 text-[#5f6368] border-r border-[#e2e3e3] font-bold cursor-pointer hover:bg-[#e8eaed]" title="로비로 나가기" onclick="goToLobby()">◀</div>
                <div class="bg-white text-[#1a73e8] font-bold px-3 md:px-4 py-1.5 border-r border-t border-l border-[#e2e3e3] shadow-[0_-1px_0_#1a73e8] cursor-pointer whitespace-nowrap">STREAMS_DB</div>
                <div class="text-[#5f6368] px-3 md:px-4 py-1.5 hover:bg-[#e8eaed] cursor-pointer whitespace-nowrap" onclick="confirmRestartGame()">초기화</div>
            </div>
            
            <div class="flex items-center gap-1.5 md:gap-2 pr-1 md:pr-2 py-1.5 flex-shrink-0">
                <button id="btn-start" onclick="startGame()" class="hidden bg-[#0f9d58] text-white border border-[#0b8043] px-3 md:px-4 py-1 hover:bg-[#0b8043] disabled:opacity-50 whitespace-nowrap">매크로 실행 (Start)</button>
                <button id="btn-ready" onclick="toggleReady()" class="hidden bg-[#1a73e8] text-white border border-[#1557b0] px-3 md:px-4 py-1 hover:bg-[#1557b0] transition-colors disabled:opacity-50 whitespace-nowrap">데이터 커밋 (Ready)</button>
            </div>
        </div>
    </div>

    <div id="loading" class="hidden fixed inset-0 bg-white/70 flex items-center justify-center z-[400]"><span class="text-[#333] font-bold text-xs bg-white border border-[#ccc] px-4 py-2 shadow-sm">데이터 통신 중...</span></div>

    <script>
        const supabaseClient = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        const COLORS = ["#ea4335", "#f29900", "#fbbc04", "#34a853", "#46bdc6", "#4285f4", "#8ab4f8", "#9334e6", "#f06292", "#9aa0a6"];
        const state = { user: null, roomCode: null, roomData: null, players: [], myPlayerInfo: null };
        let localSelectedSlot = null; // 스트림스 선택 슬롯 로컬 저장
        let secretTimer = null;

        function showToast(msg) { const toast = document.getElementById('toast'); toast.innerText = msg; toast.classList.remove('opacity-0', 'translate-y-5'); setTimeout(() => toast.classList.add('opacity-0', 'translate-y-5'), 2000); }
        function showLoading(show) { document.getElementById('loading').classList.toggle('hidden', !show); }
        function goToLobby() { window.location.href = 'index.html'; }

        window.onload = async () => {
            const urlParams = new URLSearchParams(window.location.search);
            state.roomCode = urlParams.get('code');
            if (!state.roomCode) return goToLobby();

            showLoading(true);
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) { alert("로그인이 필요합니다."); return goToLobby(); }
            state.user = session.user;

            const { data: room } = await supabaseClient.from('game_rooms').select('*').eq('room_code', state.roomCode).single();
            if (!room) { alert("존재하지 않는 데이터입니다."); return goToLobby(); }

            const { data: existingPlayer } = await supabaseClient.from('game_players').select('*').eq('room_code', state.roomCode).eq('user_id', state.user.id).single();
            showLoading(false);

            if (existingPlayer) {
                if (existingPlayer.is_active === false) await supabaseClient.from('game_players').update({ is_active: true }).eq('room_code', state.roomCode).eq('user_id', state.user.id);
                enterGame();
            } else {
                document.getElementById('screen-color').classList.remove('hidden'); document.getElementById('screen-color').classList.add('flex');
                const { data: taken } = await supabaseClient.from('game_players').select('color').eq('room_code', state.roomCode).eq('is_active', true);
                const takenColors = taken ? taken.map(p => p.color) : [];
                const grid = document.getElementById('color-grid');
                grid.innerHTML = COLORS.map(c => `<button onclick="${takenColors.includes(c) ? '' : `selectColor('${c}')`}" class="w-full aspect-square border border-[#ccc] transition-all ${takenColors.includes(c) ? 'opacity-20 cursor-not-allowed' : 'hover:border-[#333] hover:shadow-inner'}" style="background-color: ${c}"></button>`).join('');
            }
        };

        async function selectColor(color) {
            showLoading(true);
            const { error } = await supabaseClient.from('game_players').insert([{ room_code: state.roomCode, user_id: state.user.id, user_name: state.user.user_metadata.display_name, color: color, is_active: true, board_state: JSON.stringify(Array(20).fill("")) }]);
            showLoading(false);
            if(error) return showToast("오류 발생");
            document.getElementById('screen-color').classList.add('hidden'); document.getElementById('screen-color').classList.remove('flex');
            enterGame();
        }

        async function enterGame() {
            document.getElementById('screen-game').classList.remove('hidden'); document.getElementById('screen-game').classList.add('flex');
            supabaseClient.channel('room_' + state.roomCode)
                .on('postgres_changes', { event: '*', schema: 'public', table: 'game_rooms', filter: `room_code=eq.${state.roomCode}` }, refreshGame)
                .on('postgres_changes', { event: '*', schema: 'public', table: 'game_players', filter: `room_code=eq.${state.roomCode}` }, refreshGame)
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'game_chat', filter: `room_code=eq.${state.roomCode}` }, (p) => appendChatMessage(p.new))
                .subscribe();
            await loadChatHistory(state.roomCode); refreshGame();
        }

        async function loadChatHistory(code) {
            const { data } = await supabaseClient.from('game_chat').select('*').eq('room_code', code).order('id', { ascending: true });
            const box = document.getElementById('chat-messages'); box.innerHTML = '';
            if (data) data.forEach(c => appendChatMessage(c));
        }

        async function refreshGame() {
            const { data: room } = await supabaseClient.from('game_rooms').select('*').eq('room_code', state.roomCode).single();
            if(!room) { alert("연결이 끊어졌습니다."); return goToLobby(); }
            
            const { data: players } = await supabaseClient.from('game_players').select('*').eq('room_code', state.roomCode).eq('is_active', true).order('user_name');
            const me = players.find(p => p.user_id === state.user.id);
            if (!me) { alert("세션에서 제외되었습니다."); supabaseClient.removeAllChannels(); return goToLobby(); }

            state.roomData = room; state.players = players; state.myPlayerInfo = me;

            // 게임 자동 진행 체크 (모두 Ready 시 방장이 다음 라운드 진행)
            const isAllReady = players.length > 0 && players.every(p => p.is_ready);
            if (state.roomData.status === 'playing' && isAllReady && state.myPlayerInfo.user_id === players[0].user_id) {
                let gameState = JSON.parse(state.roomData.current_theme || "{}");
                if (gameState.round >= 20) {
                    await supabaseClient.from('game_rooms').update({ status: 'revealed' }).eq('room_code', state.roomCode);
                } else {
                    const nextTile = gameState.pool.splice(Math.floor(Math.random() * gameState.pool.length), 1)[0];
                    gameState.round += 1;
                    gameState.current = nextTile;
                    await supabaseClient.from('game_rooms').update({ current_theme: JSON.stringify(gameState) }).eq('room_code', state.roomCode);
                    await supabaseClient.from('game_players').update({ is_ready: false }).eq('room_code', state.roomCode);
                }
            }

            // 본인이 ready 해제되었으면 로컬 슬롯 초기화
            if (!state.myPlayerInfo.is_ready) localSelectedSlot = null;
            renderUI();
        }

        // 스트림스 점수 계산 로직 (조커 다리 최적화 포함)
        function calculateStreamsScore(values) {
            const scoreTable = {0:0, 1:0, 2:1, 3:3, 4:5, 5:7, 6:9, 7:11, 8:15, 9:20, 10:25, 11:30, 12:35, 13:40, 14:50, 15:60, 16:70, 17:85, 18:100, 19:150, 20:300};
            
            function getGroups(vals) {
                let groups = [], currentGroup = [];
                for (let i = 0; i < vals.length; i++) {
                    const val = vals[i];
                    if (val === "" || val === null) {
                        if (currentGroup.length > 0) { groups.push({len: currentGroup.length}); currentGroup = []; }
                        continue;
                    }
                    const num = parseInt(val);
                    if (currentGroup.length === 0) { currentGroup.push(num); } 
                    else {
                        if (num >= currentGroup[currentGroup.length - 1]) { currentGroup.push(num); } 
                        else { groups.push({len: currentGroup.length}); currentGroup = [num]; }
                    }
                }
                if (currentGroup.length > 0) groups.push({len: currentGroup.length});
                return groups;
            }

            const jokerIdx = values.indexOf("★");
            if (jokerIdx === -1) {
                return getGroups(values).reduce((sum, g) => sum + (scoreTable[g.len] || 0), 0);
            } else {
                let leftVal = jokerIdx > 0 ? values[jokerIdx - 1] : "";
                let rightVal = jokerIdx < 19 ? values[jokerIdx + 1] : "";
                if (leftVal !== "" && rightVal !== "" && leftVal !== "★" && rightVal !== "★" && parseInt(leftVal) <= parseInt(rightVal)) {
                    let sBridge = [...values]; sBridge[jokerIdx] = leftVal;
                    return getGroups(sBridge).reduce((sum, g) => sum + (scoreTable[g.len] || 0), 0);
                } else {
                    let s1 = [...values]; s1[jokerIdx] = 99;
                    let s2 = [...values]; s2[jokerIdx] = -1;
                    let sc1 = getGroups(s1).reduce((sum, g) => sum + (scoreTable[g.len] || 0), 0);
                    let sc2 = getGroups(s2).reduce((sum, g) => sum + (scoreTable[g.len] || 0), 0);
                    return Math.max(sc1, sc2);
                }
            }
        }

        function renderUI() {
            document.getElementById('room-info-display').innerText = `[공유] ${state.roomData.room_name} (ID: ${state.roomCode})`;
            
            let gameState = { round: 0, current: "-", pool: [] };
            if (state.roomData.status !== 'waiting') {
                try { gameState = JSON.parse(state.roomData.current_theme || "{}"); } catch(e) {}
            }

            document.getElementById('display-theme').innerText = state.roomData.status === 'playing' ? 
                `=STREAMS_PULL(Round: ${gameState.round}/20, Value: "${gameState.current}")` : 
                (state.roomData.status === 'revealed' ? "=STREAMS_EVAL(Status: 'GAME_OVER')" : "#WAITING_FOR_MACRO");

            // 동적 헤더 생성
            let headerHTML = `<div class="w-8 md:w-10 cell-border flex justify-center py-1 flex-shrink-0">#</div>
                              <div class="w-24 md:w-32 cell-border px-2 py-1 text-[#1a73e8] font-bold">내 데이터(Me)</div>`;
            state.players.forEach(p => {
                if(p.user_id !== state.user.id) headerHTML += `<div class="w-24 md:w-32 cell-border px-2 py-1 flex items-center gap-1.5"><div class="w-1.5 h-1.5 rounded-full" style="background-color:${p.color}"></div><span class="truncate">${p.user_name}</span></div>`;
            });
            document.getElementById('grid-header').innerHTML = headerHTML;

            // 데이터 분해
            let myBoard = Array(20).fill("");
            try { myBoard = JSON.parse(state.myPlayerInfo.board_state || "[]"); if(myBoard.length < 20) myBoard = Array(20).fill(""); } catch(e) {}
            
            let otherBoards = {};
            state.players.forEach(p => {
                if(p.user_id !== state.user.id) {
                    try { otherBoards[p.user_id] = JSON.parse(p.board_state || "[]"); if(otherBoards[p.user_id].length<20) otherBoards[p.user_id] = Array(20).fill(""); } 
                    catch(e) { otherBoards[p.user_id] = Array(20).fill(""); }
                }
            });

            // 20개 슬롯(행) 렌더링
            let rowsHTML = "";
            for(let i=0; i<20; i++) {
                let isSelected = (localSelectedSlot === i+1);
                let myVal = myBoard[i] || "";
                let displayVal = myVal;
                
                // 아직 커밋 전이고 현재 선택한 칸이면 미리보기
                if (isSelected && state.roomData.status === 'playing' && !state.myPlayerInfo.is_ready && myVal === "") {
                    displayVal = gameState.current;
                }

                let cellClass = isSelected ? "bg-[#e8eaed] border-[#1a73e8] border shadow-inner text-[#1a73e8] font-bold" : (myVal ? "font-bold text-[#333]" : "text-[#9aa0a6]");

                let rowHTML = `<div class="flex w-full min-w-max row-hover ${isSelected ? 'bg-[#f1f3f4]':''}">
                    <div class="w-8 md:w-10 cell-border bg-[#f8f9fa] flex items-center justify-center text-[#5f6368]">${i+1}</div>
                    <div class="w-24 md:w-32 cell-border px-2 py-1.5 text-center cursor-pointer ${cellClass}" onclick="selectSlot(${i+1})">${displayVal}</div>`;

                state.players.forEach(p => {
                    if(p.user_id !== state.user.id) {
                        let oVal = otherBoards[p.user_id][i] || "";
                        rowHTML += `<div class="w-24 md:w-32 cell-border px-2 py-1.5 text-center ${oVal ? 'font-bold text-[#333]' : ''}">${oVal}</div>`;
                    }
                });
                rowHTML += `</div>`;
                rowsHTML += rowHTML;
            }

            // 점수(∑) 계산 및 하단 고정 헤더
            let scoreHTML = `<div class="flex w-full min-w-max bg-[#f8f9fa] sticky bottom-0 border-t-[3px] border-[#ccc] shadow-[0_-2px_5px_rgba(0,0,0,0.05)]">
                <div class="w-8 md:w-10 cell-border flex items-center justify-center text-[#5f6368] font-bold text-sm">∑</div>
                <div class="w-24 md:w-32 cell-border px-2 py-1.5 text-center font-black text-[#1a73e8] text-sm">${calculateStreamsScore(myBoard)}</div>`;
            state.players.forEach(p => {
                if(p.user_id !== state.user.id) scoreHTML += `<div class="w-24 md:w-32 cell-border px-2 py-1.5 text-center font-bold text-[#333]">${calculateStreamsScore(otherBoards[p.user_id])}</div>`;
            });
            scoreHTML += `</div>`;

            document.getElementById('card-slots').innerHTML = rowsHTML + scoreHTML;

            // 버튼 표시 제어
            document.getElementById('btn-start').classList.toggle('hidden', state.roomData.status !== 'waiting');
            document.getElementById('btn-ready').classList.toggle('hidden', state.roomData.status !== 'playing');
            
            const btnReady = document.getElementById('btn-ready');
            btnReady.innerText = state.myPlayerInfo?.is_ready ? "커밋 취소 (Undo)" : "데이터 커밋 (Commit)";
            btnReady.disabled = (!localSelectedSlot && !state.myPlayerInfo.is_ready); // 슬롯을 골라야 커밋 가능
            
            if(state.myPlayerInfo?.is_ready) {
                btnReady.classList.replace('bg-[#1a73e8]', 'bg-[#f1f3f4]'); btnReady.classList.replace('text-white', 'text-[#333]'); btnReady.classList.replace('border-[#1557b0]', 'border-[#ccc]');
            } else {
                btnReady.classList.replace('bg-[#f1f3f4]', 'bg-[#1a73e8]'); btnReady.classList.replace('text-[#333]', 'text-white'); btnReady.classList.replace('border-[#ccc]', 'border-[#1557b0]');
            }
        }

        // 스트림스 타일 생성
        function generateStreamsTiles() {
            let tiles = [];
            for (let i = 1; i <= 10; i++) tiles.push(i);
            for (let i = 11; i <= 19; i++) { tiles.push(i); tiles.push(i); }
            for (let i = 20; i <= 30; i++) tiles.push(i);
            tiles.push("★");
            return tiles;
        }

        async function startGame() {
            const btnStart = document.getElementById('btn-start'); btnStart.disabled = true; showLoading(true);
            const { data: currentPlayers, error: fetchErr } = await supabaseClient.from('game_players').select('*').eq('room_code', state.roomCode).eq('is_active', true);
            if (fetchErr || !currentPlayers || currentPlayers.length === 0) { showLoading(false); btnStart.disabled = false; return showToast("통신 오류"); }

            const pool = generateStreamsTiles();
            const firstTile = pool.splice(Math.floor(Math.random() * pool.length), 1)[0];
            const gameStateStr = JSON.stringify({ pool: pool, round: 1, current: firstTile });
            
            const { error: roomError } = await supabaseClient.from('game_rooms').update({ current_theme: gameStateStr, status: 'playing' }).eq('room_code', state.roomCode);
            if (roomError) { showLoading(false); btnStart.disabled = false; return showToast("권한 부족"); }
            
            const emptyBoardStr = JSON.stringify(Array(20).fill(""));
            for(let i=0; i < currentPlayers.length; i++) { 
                await supabaseClient.from('game_players').update({ board_state: emptyBoardStr, is_ready: false }).eq('room_code', state.roomCode).eq('user_id', currentPlayers[i].user_id); 
            }
            showLoading(false); btnStart.disabled = false; await refreshGame();
        }

        function confirmRestartGame() { openConfirmModal("모든 데이터를 초기화하시겠습니까?\n(메모 로그 영구 삭제)", handleRestartGame); }
        async function handleRestartGame() {
            showLoading(true);
            const emptyBoardStr = JSON.stringify(Array(20).fill(""));
            await supabaseClient.from('game_rooms').update({ status: 'waiting', current_theme: '' }).eq('room_code', state.roomCode);
            await supabaseClient.from('game_players').update({ board_state: emptyBoardStr, is_ready: false }).eq('room_code', state.roomCode);
            await supabaseClient.from('game_chat').delete().eq('room_code', state.roomCode);
            localSelectedSlot = null; document.getElementById('chat-messages').innerHTML = ''; showLoading(false); showToast("초기화 완료");
        }

        function selectSlot(n) { 
            if(state.roomData.status !== 'playing' || state.myPlayerInfo?.is_ready) return; 
            let myBoard = JSON.parse(state.myPlayerInfo.board_state || "[]");
            if(myBoard[n-1] !== "") return showToast("이미 데이터가 존재합니다.");
            localSelectedSlot = n;
            renderUI(); // 클릭 시 즉시 화면에 반영(미리보기)
        }
        
        async function toggleReady() { 
            document.getElementById('btn-ready').disabled = true; 
            let myBoard = JSON.parse(state.myPlayerInfo.board_state || "[]");
            
            // 확정 버튼 누를 때 로직
            if (!state.myPlayerInfo.is_ready) {
                if(!localSelectedSlot) return showToast("위치를 선택해주세요.");
                let gameState = JSON.parse(state.roomData.current_theme || "{}");
                myBoard[localSelectedSlot-1] = gameState.current;
            } else {
                // 커밋 취소 로직
                if(localSelectedSlot) myBoard[localSelectedSlot-1] = ""; 
            }

            await supabaseClient.from('game_players').update({ board_state: JSON.stringify(myBoard), is_ready: !state.myPlayerInfo.is_ready }).eq('room_code', state.roomCode).eq('user_id', state.user.id); 
        }
        
        async function handleChatSubmit(e) {
            e.preventDefault(); const i = document.getElementById('chat-input'); const m = i.value.trim(); if(!m) return; i.value = ""; i.focus();
            await supabaseClient.from('game_chat').insert([{ room_code: state.roomCode, user_name: state.user.user_metadata.display_name, color: state.myPlayerInfo?.color || '#333', message: m }]);
        }

        function appendChatMessage(c) {
            const box = document.getElementById('chat-messages'); const isMe = c.user_name === state.user.user_metadata.display_name;
            const d = document.createElement('div'); d.className = "flex flex-col mb-2";
            d.innerHTML = `<div class="text-[9px] md:text-[10px] font-bold text-[#333] mb-0.5 flex items-center gap-1"><div class="w-1.5 h-1.5 rounded-full" style="background-color: ${c.color}"></div>${c.user_name} ${isMe ? '<span class="text-[#9aa0a6] font-normal">(나)</span>' : ''}</div><div class="chat-bubble bg-white px-2 py-1 text-[#333] shadow-sm">${c.message}</div>`;
            box.appendChild(d); box.scrollTop = box.scrollHeight;
        }

        // 모달 및 관리 유틸
        function openMemberManage() { closeRoomManage(); const list = document.getElementById('member-manage-list'); list.innerHTML = state.players.map(p => `<div class="flex justify-between items-center py-2 border-b border-[#e2e3e3] last:border-0"><div class="flex items-center gap-2"><div class="w-2 h-2 rounded-full" style="background-color: ${p.color}"></div><span class="text-[#333] font-medium">${p.user_name}</span></div>${p.user_id !== state.user.id ? `<button onclick="confirmKickMember('${p.user_id}', '${p.user_name}')" class="text-xs border border-[#ccc] px-2 py-1 hover:bg-[#f1f3f4]">제외</button>` : `<span class="text-xs text-[#9aa0a6]">관리자</span>`}</div>`).join(''); document.getElementById('modal-member-list').classList.remove('hidden'); }
        function closeMemberManage() { document.getElementById('modal-member-list').classList.add('hidden'); }
        function confirmKickMember(id, name) { openConfirmModal(`[${name}] 레코드를 제외하시겠습니까?\n프로세스가 재시작됩니다.`, () => handleKickMember(id)); }
        async function handleKickMember(id) { showLoading(true); await supabaseClient.from('game_players').update({ is_active: false, selected_slot: null, secret_number: null, is_ready: false }).eq('room_code', state.roomCode).eq('user_id', id); await handleRestartGame(); showLoading(false); showToast("제외 완료"); closeMemberManage(); }

        function openRoomManage() { document.getElementById('modal-room-manage').classList.remove('hidden'); }
        function closeRoomManage() { document.getElementById('modal-room-manage').classList.add('hidden'); }
        async function handleShareRoom() { const t = `[공유 워크스페이스]\n시트: ${state.roomData.room_name}\n엑세스 키: ${state.roomCode}\n접속: ${window.location.origin}/streams.html?code=${state.roomCode}`; try { await copyToClipboard(t); } catch (e) {} closeRoomManage(); }
        async function copyToClipboard(text) { if (navigator.clipboard && window.isSecureContext) { try { await navigator.clipboard.writeText(text); showToast("클립보드에 복사됨"); return; } catch (err) {} } const textArea = document.createElement("textarea"); textArea.value = text; textArea.style.position = "fixed"; textArea.style.left = "-9999px"; textArea.style.top = "0"; document.body.appendChild(textArea); textArea.focus(); textArea.select(); try { document.execCommand('copy'); showToast("클립보드에 복사됨"); } catch (err) { showToast("복사 실패"); } document.body.removeChild(textArea); }
        function openRenameModal() { closeRoomManage(); document.getElementById('renameInput').value = state.roomData.room_name; document.getElementById('modal-rename').classList.remove('hidden'); }
        function closeRenameModal() { document.getElementById('modal-rename').classList.add('hidden'); }
        async function handleRenameRoom() { const n = document.getElementById('renameInput').value.trim(); if(!n) return; await supabaseClient.from('game_rooms').update({ room_name: n }).eq('room_code', state.roomCode); showToast("변경 저장됨"); closeRenameModal(); }
        function confirmDeleteRoom() { closeRoomManage(); openConfirmModal("모든 데이터를 영구 삭제하시겠습니까?", async () => { await supabaseClient.from('game_rooms').delete().eq('room_code', state.roomCode); goToLobby(); }); }
        function openConfirmModal(m, a) { document.getElementById('confirm-message').innerText = m; const b = document.getElementById('btn-confirm-action'); const nb = b.cloneNode(true); b.parentNode.replaceChild(nb, b); nb.onclick = () => { closeConfirmModal(); a(); }; document.getElementById('modal-confirm').classList.remove('hidden'); }
        function closeConfirmModal() { document.getElementById('modal-confirm').classList.add('hidden'); }

    </script>
</body>
</html>
