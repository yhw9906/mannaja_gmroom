<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MANNAJA - 종합 보드게임 플랫폼</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>.no-scrollbar::-webkit-scrollbar { display: none; } .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }</style>
</head>
<body class="bg-gray-100 text-gray-900 font-sans min-h-screen flex items-center justify-center md:p-4">

    <div id="toast" class="fixed top-10 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full shadow-lg opacity-0 transition-all z-[300] pointer-events-none text-sm font-bold w-max max-w-[90vw] text-center"></div>

    <div class="w-full max-w-md bg-white md:rounded-3xl shadow-2xl overflow-hidden flex flex-col h-[100dvh] md:h-[750px]">
        
        <div class="bg-white px-6 pt-10 pb-6 border-b border-gray-100 text-center flex-shrink-0">
            <h1 class="text-3xl font-black text-gray-900 tracking-tighter">MANNAJA</h1>
            <p class="text-[10px] text-gray-400 font-bold mt-1 tracking-widest uppercase">Boardgame Hub</p>
        </div>

        <div class="flex-1 overflow-y-auto p-6 flex flex-col">
            
            <div id="screen-auth" class="hidden flex-col justify-center h-full space-y-4">
                <input type="email" id="email" placeholder="이메일" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl outline-none font-medium focus:border-gray-400 transition-colors">
                <input type="password" id="password" placeholder="비밀번호" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl outline-none font-medium focus:border-gray-400 transition-colors">
                <input type="text" id="nickname" placeholder="닉네임 (가입 시)" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl outline-none font-bold focus:border-gray-400 transition-colors">
                <div class="flex gap-2 pt-2">
                    <button onclick="handleAuth('login')" class="flex-1 bg-black text-white py-4 rounded-xl font-bold shadow-md hover:bg-gray-800 transition-colors">로그인</button>
                    <button onclick="handleAuth('signup')" class="flex-1 bg-gray-200 text-gray-800 py-4 rounded-xl font-bold hover:bg-gray-300 transition-colors">회원가입</button>
                </div>
            </div>

            <div id="screen-dashboard" class="hidden flex-col h-full space-y-4 justify-center pb-4">
                
                <div class="mb-4">
                    <p class="text-xs font-bold text-gray-400 mb-1">환영합니다,</p>
                    <div class="flex justify-between items-end">
                        <p id="user-display-main" class="text-2xl font-black text-gray-900"></p>
                        <button onclick="handleLogout()" class="text-xs text-gray-400 font-bold hover:text-gray-900 underline">로그아웃</button>
                    </div>
                </div>

                <button onclick="openProfileModal()" class="flex items-center justify-between p-5 bg-white border border-gray-200 rounded-2xl hover:border-black hover:shadow-md transition-all group">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-lg">👤</div>
                        <div class="text-left"><p class="font-bold text-gray-900">개인정보 수정</p><p class="text-[10px] text-gray-500 font-medium">닉네임 변경 및 계정 관리</p></div>
                    </div>
                    <span class="text-gray-300 group-hover:text-black font-bold">➔</span>
                </button>

                <button onclick="openRoomListModal()" class="flex items-center justify-between p-5 bg-white border border-gray-200 rounded-2xl hover:border-black hover:shadow-md transition-all group">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-lg">📜</div>
                        <div class="text-left"><p class="font-bold text-gray-900">내 게임 방 목록</p><p class="text-[10px] text-gray-500 font-medium">참여 중이거나 나간 방 조회</p></div>
                    </div>
                    <span class="text-gray-300 group-hover:text-black font-bold">➔</span>
                </button>

                <button onclick="openCreateRoomModal()" class="flex items-center justify-between p-5 bg-white border border-gray-200 rounded-2xl hover:border-black hover:shadow-md transition-all group mt-2">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-lg">➕</div>
                        <div class="text-left">
                            <p class="font-bold text-gray-900">새 게임 방 만들기</p>
                            <p class="text-[10px] text-gray-500 font-medium">원하는 게임을 선택해 방 생성</p>
                        </div>
                    </div>
                    <span class="text-gray-300 group-hover:text-black font-bold">➔</span>
                </button>


                <button onclick="openJoinRoomModal()" class="flex items-center justify-between p-5 bg-white border border-gray-200 rounded-2xl hover:border-black hover:shadow-md transition-all group">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-lg">🚪</div>
                        <div class="text-left"><p class="font-bold text-gray-900">코드로 입장하기</p><p class="text-[10px] text-gray-500 font-medium">초대 코드를 입력하여 참여</p></div>
                    </div>
                    <span class="text-gray-300 group-hover:text-black font-bold">➔</span>
                </button>

            </div>
        </div>
    </div>

    <div id="modal-profile" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-[240] p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6">
            <h2 class="font-black text-lg mb-4 text-gray-900">개인정보 수정</h2>
            <input type="text" id="profileNameInput" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl outline-none font-bold mb-4" placeholder="새 닉네임 입력">
            <div class="flex gap-2">
                <button onclick="closeProfileModal()" class="flex-1 py-4 bg-gray-100 text-gray-600 rounded-xl font-bold hover:bg-gray-200 transition-colors">취소</button>
                <button onclick="handleUpdateProfile()" class="flex-1 py-4 bg-black text-white rounded-xl font-bold hover:bg-gray-800 transition-colors">변경 적용</button>
            </div>
        </div>
    </div>

    <div id="modal-room-list" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-[240] md:p-4">
        <div class="bg-white md:rounded-2xl shadow-2xl w-full h-full md:h-[80%] max-w-md flex flex-col">
            <div class="p-5 border-b border-gray-100 flex justify-between items-center bg-white flex-shrink-0">
                <h2 class="font-black text-lg text-gray-900">내 게임 방 목록</h2>
                <button onclick="closeRoomListModal()" class="text-gray-400 hover:text-black font-black text-xl px-2">✕</button>
            </div>
            <div class="flex-1 overflow-y-auto p-5 space-y-6 bg-gray-50 no-scrollbar">
                <div>
                    <h3 class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3 px-1">참여 중인 게임</h3>
                    <div id="my-game-list" class="space-y-2"></div>
                </div>
                <div>
                    <h3 class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3 border-t border-gray-200 pt-4 px-1">게임 히스토리</h3>
                    <div id="my-history-list" class="space-y-2"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-create-room" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-[240] p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6">
            <h2 class="font-black text-lg mb-4 text-gray-900">새 게임 방 만들기</h2>
            <div class="space-y-3 mb-6">
                <select id="gameType" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl outline-none font-bold text-sm text-gray-700">
                    <option value="mind">마음의 실타래</option>
                    <option value="streams">스트림스 (STREAMS)</option>
                    <option value="thegame">더 게임 (THE GAME)</option>
                    <option value="whoami">양세찬 게임 (WHO AM I)</option>
                </select>
                <input type="text" id="roomName" placeholder="방 이름을 입력하세요" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl outline-none font-bold text-sm">
            </div>
            <div class="flex gap-2">
                <button onclick="closeCreateRoomModal()" class="w-1/3 py-4 bg-gray-100 text-gray-600 rounded-xl font-bold hover:bg-gray-200 transition-colors">취소</button>
                <button onclick="createRoom()" class="w-2/3 py-4 bg-black text-white rounded-xl font-bold hover:bg-gray-800 transition-colors">방 생성하기</button>
            </div>
        </div>
    </div>

    <div id="modal-join-room" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-[240] p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6">
            <h2 class="font-black text-lg mb-4 text-gray-900">코드로 입장하기</h2>
            <input type="text" id="joinCode" placeholder="초대 코드 6자리 입력" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl outline-none uppercase font-bold text-center tracking-widest text-lg mb-6 focus:border-gray-400">
            <div class="flex gap-2">
                <button onclick="closeJoinRoomModal()" class="w-1/3 py-4 bg-gray-100 text-gray-600 rounded-xl font-bold hover:bg-gray-200 transition-colors">취소</button>
                <button onclick="joinRoomByCode()" class="w-2/3 py-4 bg-black text-white rounded-xl font-bold hover:bg-gray-800 transition-colors">입장 확인</button>
            </div>
        </div>
    </div>

    <div id="loading" class="hidden fixed inset-0 bg-white bg-opacity-90 flex items-center justify-center z-[400]"><span class="text-gray-900 font-black tracking-widest animate-pulse">LOADING</span></div>

    <script>
        const supabaseClient = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        let user = null;

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg; toast.classList.remove('opacity-0', '-translate-y-5');
            setTimeout(() => toast.classList.add('opacity-0', '-translate-y-5'), 2500);
        }
        function showLoading(show) { document.getElementById('loading').classList.toggle('hidden', !show); }

        window.onload = async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                user = session.user;
                document.getElementById('user-display-main').innerText = user.user_metadata.display_name;
                document.getElementById('screen-auth').classList.add('hidden');
                document.getElementById('screen-dashboard').classList.remove('hidden');
                document.getElementById('screen-dashboard').classList.add('flex');
            } else {
                document.getElementById('screen-auth').classList.remove('hidden');
            }
        };

        async function handleAuth(type) {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const nickname = document.getElementById('nickname').value.trim();
            showLoading(true);
            if (type === 'signup') {
                const { error } = await supabaseClient.auth.signUp({ email, password, options: { data: { display_name: nickname } } });
                showLoading(false);
                if (error) return showToast(error.message);
                showToast("가입 완료. 로그인 해주세요.");
            } else {
                const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
                showLoading(false);
                if (error) return showToast("정보를 확인하세요.");
                location.reload();
            }
        }
        async function handleLogout() { await supabaseClient.auth.signOut(); location.reload(); }

        /* --- 모달 제어 함수 --- */
        function openProfileModal() { document.getElementById('profileNameInput').value = user.user_metadata.display_name || ""; document.getElementById('modal-profile').classList.remove('hidden'); }
        function closeProfileModal() { document.getElementById('modal-profile').classList.add('hidden'); }
        
        function openRoomListModal() { loadMyGames(); document.getElementById('modal-room-list').classList.remove('hidden'); }
        function closeRoomListModal() { document.getElementById('modal-room-list').classList.add('hidden'); }
        
        function openCreateRoomModal() { document.getElementById('roomName').value = ""; document.getElementById('modal-create-room').classList.remove('hidden'); }
        function closeCreateRoomModal() { document.getElementById('modal-create-room').classList.add('hidden'); }
        
        function openJoinRoomModal() { document.getElementById('joinCode').value = ""; document.getElementById('modal-join-room').classList.remove('hidden'); }
        function closeJoinRoomModal() { document.getElementById('modal-join-room').classList.add('hidden'); }

        async function handleUpdateProfile() {
            const n = document.getElementById('profileNameInput').value.trim(); if(!n) return;
            showLoading(true);
            await supabaseClient.auth.updateUser({ data: { display_name: n } });
            await supabaseClient.from('game_players').update({ user_name: n }).eq('user_id', user.id);
            user.user_metadata.display_name = n; document.getElementById('user-display-main').innerText = n;
            showToast("변경 완료"); closeProfileModal(); showLoading(false);
        }
        
        const gameNames = { 'mind': '마음의 실타래', 'streams': '스트림스', 'thegame': '더 게임', 'whoami': '양세찬 게임' }; 

        function createGameListItem(i, isActive) {
            const gameTitle = gameNames[i.game_rooms.game_type] || i.game_rooms.game_type;
            return `
                <div onclick="goToGame('${i.game_rooms.game_type}', '${i.room_code}')" class="p-4 bg-white border border-gray-200 rounded-xl flex justify-between items-center cursor-pointer hover:border-black shadow-sm transition-all group ${isActive ? '' : 'opacity-60'}">
                    <div>
                        <h4 class="font-bold text-gray-900 text-sm flex items-center gap-2">
                            ${i.game_rooms.room_name}
                            ${!isActive ? '<span class="text-[8px] bg-gray-200 text-gray-500 px-1.5 py-0.5 rounded-sm font-black tracking-widest">종료/나감</span>' : ''}
                        </h4>
                        <p class="text-[10px] font-bold text-gray-400 mt-1"><span class="text-gray-500 mr-2">${gameTitle}</span> CODE: <span class="text-gray-700">${i.room_code}</span></p>
                    </div>
                    <span class="text-gray-300 group-hover:text-black font-black text-xs transition-colors">${isActive ? '입장' : '재입장'}</span>
                </div>
            `;
        }

        async function loadMyGames() {
            try {
                // 1. 내 플레이어 기록 가져오기
                const { data: myPlayers, error } = await supabaseClient.from('game_players')
                    .select('*')
                    .eq('user_id', user.id);

                const activeList = document.getElementById('my-game-list');
                const historyList = document.getElementById('my-history-list');

                if (error || !myPlayers || myPlayers.length === 0) {
                    activeList.innerHTML = `<p class="text-center py-6 text-xs text-gray-400 font-bold bg-white border border-gray-200 rounded-xl">참여 중인 게임이 없습니다.</p>`;
                    historyList.innerHTML = `<p class="text-center py-6 text-xs text-gray-400 font-bold bg-white border border-gray-200 rounded-xl">기록이 없습니다.</p>`;
                    return;
                }

                const roomCodes = [...new Set(myPlayers.map(p => p.room_code))];

                // 2. 현재 존재하는 방 정보만 가져오기 (폭파된 방은 여기서 자연스럽게 제외됨)
                const { data: rooms } = await supabaseClient.from('game_rooms')
                    .select('*')
                    .in('room_code', roomCodes);

                if (!rooms || rooms.length === 0) {
                    activeList.innerHTML = `<p class="text-center py-6 text-xs text-gray-400 font-bold bg-white border border-gray-200 rounded-xl">참여 중인 게임이 없습니다.</p>`;
                    historyList.innerHTML = `<p class="text-center py-6 text-xs text-gray-400 font-bold bg-white border border-gray-200 rounded-xl">기록이 없습니다.</p>`;
                    return;
                }

                // 3. 정렬을 위해 각 방의 최신 채팅(메모) 기록 가져오기
                const validRoomCodes = rooms.map(r => r.room_code);
                const { data: chats } = await supabaseClient.from('game_chat')
                    .select('room_code, id')
                    .in('room_code', validRoomCodes)
                    .order('id', { ascending: false }); // 최신 채팅이 위로 오도록 가져옴

                // 방별로 가장 높은(최신) chat id 매핑
                const latestChatMap = {};
                if (chats) {
                    chats.forEach(c => {
                        if (!latestChatMap[c.room_code]) latestChatMap[c.room_code] = c.id;
                    });
                }

                // 4. 유효한 방만 필터링하고 채팅 최신순으로 정렬
                let validData = myPlayers
                    .map(p => {
                        const roomInfo = rooms.find(r => r.room_code === p.room_code);
                        // 방이 존재할 때만 데이터 유지, 폭파된 방은 null 처리되어 아래에서 삭제됨
                        return roomInfo ? { ...p, game_rooms: roomInfo, latestChatId: latestChatMap[p.room_code] || 0 } : null;
                    })
                    .filter(item => item !== null);

                // 💡 핵심 정렬 로직: 채팅 ID가 높은 것(최신)부터 내림차순 정렬. 채팅이 아예 없다면 방 입장 순서로 정렬
                validData.sort((a, b) => b.latestChatId - a.latestChatId || b.id - a.id);

                const activeData = validData.filter(i => i.is_active !== false);
                const historyData = validData.filter(i => i.is_active === false);

                activeList.innerHTML = activeData.length ? activeData.map(i => createGameListItem(i, true)).join('') : `<p class="text-center py-6 text-xs text-gray-400 font-bold bg-white border border-gray-200 rounded-xl">참여 중인 게임이 없습니다.</p>`;
                historyList.innerHTML = historyData.length ? historyData.map(i => createGameListItem(i, false)).join('') : `<p class="text-center py-6 text-xs text-gray-400 font-bold bg-white border border-gray-200 rounded-xl">기록이 없습니다.</p>`;
                
            } catch (err) {
                console.error("목록 렌더링 에러:", err);
                showToast("목록을 구성하는 중 오류가 발생했습니다.");
            }
        }

        async function createRoom() {
            const name = document.getElementById('roomName').value.trim();
            const type = document.getElementById('gameType').value;
            if(!name) return showToast("방 이름을 입력하세요.");
            
            showLoading(true);
            const code = Math.random().toString(36).substring(2, 8).toUpperCase();
            const { error } = await supabaseClient.from('game_rooms').insert([{ room_code: code, room_name: name, game_type: type }]);
            showLoading(false);
            
            if(error) return showToast("생성 실패");
            goToGame(type, code);
        }

        async function joinRoomByCode() {
            const code = document.getElementById('joinCode').value.trim().toUpperCase();
            if(!code) return;
            
            showLoading(true);
            const { data: room } = await supabaseClient.from('game_rooms').select('game_type').eq('room_code', code).single();
            showLoading(false);
            
            if(!room) return showToast("방을 찾을 수 없습니다.");
            goToGame(room.game_type, code);
        }

        function goToGame(gameType, code) { window.location.href = `${gameType}.html?code=${code}`; }
    </script>
</body>
</html>
