<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HR_Data_Analysis_WHOAMI.xlsx</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; background-color: #ffffff; }
        .row-hover:hover { background-color: #f1f3f4; }
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 0px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
        .chat-bubble { border-radius: 0px; border-left: 3px solid #5f6368; transition: all 0.3s ease; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .cell-border { border-right: 1px solid #e2e3e3; border-bottom: 1px solid #e2e3e3; }
        .fixed-cell { height: 100%; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="text-[#333333] h-[100dvh] w-screen overflow-hidden flex flex-col bg-[#f8f9fa]">

    <div id="toast" class="fixed bottom-16 left-1/2 -translate-x-1/2 bg-[#323232] text-white px-4 py-2 opacity-0 transition-all z-[300] pointer-events-none text-xs w-max text-center shadow-md">시스템 알림</div>

    <div id="modal-room-manage" class="hidden fixed inset-0 bg-white/80 flex items-center justify-center z-[200]"><div class="bg-white border border-[#ccc] shadow-lg w-full max-w-sm p-0 text-sm"><div class="bg-[#f1f3f4] border-b border-[#ccc] px-4 py-2 font-bold text-[#333]">도구 (관리)</div><div class="p-4 flex flex-col gap-2"><button onclick="openMemberManage()" class="border border-[#ccc] py-1.5 px-3 hover:bg-[#f1f3f4] text-left">참여자 권한 관리</button><button onclick="handleShareRoom()" class="border border-[#ccc] py-1.5 px-3 hover:bg-[#f1f3f4] text-left">공유 링크 복사</button><button onclick="openRenameModal()" class="border border-[#ccc] py-1.5 px-3 hover:bg-[#f1f3f4] text-left">시트 이름 변경</button><div class="border-t border-[#ccc] mt-2 pt-2 space-y-2"><button onclick="confirmLeaveRoom()" class="border border-[#ccc] bg-[#f8f9fa] text-[#333] py-1.5 px-3 hover:bg-[#e8eaed] w-full text-left font-bold">🚪 방 나가기 (세션 이탈)</button><button onclick="confirmDeleteRoom()" class="border border-[#ccc] bg-[#fce8e6] text-[#c5221f] py-1.5 px-3 hover:bg-[#fad2cf] w-full text-left">데이터 영구 삭제 (폭파)</button></div></div><div class="bg-[#f1f3f4] border-t border-[#ccc] px-4 py-2 text-right"><button onclick="closeRoomManage()" class="bg-white border border-[#ccc] px-4 py-1 hover:bg-gray-50">닫기</button></div></div></div>
    <div id="modal-member-list" class="hidden fixed inset-0 bg-white/80 flex items-center justify-center z-[210]"><div class="bg-white border border-[#ccc] shadow-lg w-full max-w-sm p-0 text-sm"><div class="bg-[#f1f3f4] border-b border-[#ccc] px-4 py-2 font-bold text-[#333]">참여자 권한 관리</div><div id="member-manage-list" class="p-4 max-h-60 overflow-y-auto space-y-1"></div><div class="bg-[#f1f3f4] border-t border-[#ccc] px-4 py-2 text-right"><button onclick="closeMemberManage()" class="bg-white border border-[#ccc] px-4 py-1 hover:bg-gray-50">닫기</button></div></div></div>
    <div id="modal-rename" class="hidden fixed inset-0 bg-white/80 flex items-center justify-center z-[220]"><div class="bg-white border border-[#ccc] shadow-lg w-full max-w-sm p-0 text-sm"><div class="bg-[#f1f3f4] border-b border-[#ccc] px-4 py-2 font-bold text-[#333]">시트 이름 변경</div><div class="p-4"><input type="text" id="renameInput" class="w-full p-2 border border-[#ccc] outline-none focus:border-[#333]"></div><div class="bg-[#f1f3f4] border-t border-[#ccc] px-4 py-2 text-right flex justify-end gap-2"><button onclick="closeRenameModal()" class="bg-white border border-[#ccc] px-4 py-1 hover:bg-gray-50">취소</button><button onclick="handleRenameRoom()" class="bg-[#333] text-white border border-[#333] px-4 py-1 hover:bg-black">적용</button></div></div></div>
    <div id="modal-confirm" class="hidden fixed inset-0 bg-white/80 flex items-center justify-center z-[230]"><div class="bg-white border border-[#ccc] shadow-lg w-full max-w-sm p-0 text-sm"><div class="bg-[#f1f3f4] border-b border-[#ccc] px-4 py-2 font-bold text-[#333]">시스템 경고</div><div class="p-6"><p id="confirm-message" class="text-[#333] whitespace-pre-line"></p></div><div class="bg-[#f1f3f4] border-t border-[#ccc] px-4 py-2 text-right flex justify-end gap-2"><button onclick="closeConfirmModal()" class="bg-white border border-[#ccc] px-4 py-1 hover:bg-gray-50">취소</button><button id="btn-confirm-action" class="bg-[#333] text-white border border-[#333] px-4 py-1 hover:bg-black">확인</button></div></div></div>

    <div id="modal-guess" class="hidden fixed inset-0 bg-white/80 flex items-center justify-center z-[260] p-4">
        <div class="bg-white border border-[#ccc] shadow-2xl w-full max-w-sm p-0 text-sm">
            <div class="bg-[#f1f3f4] border-b border-[#ccc] px-4 py-3 font-bold text-[#333]">🎯 정답 제출하기</div>
            <div class="p-6">
                <p class="text-xs text-[#5f6368] mb-3">내 머리 위에 붙어있는 제시어는 무엇일까요?</p>
                <input type="text" id="guessInput" class="w-full p-3 bg-[#f8f9fa] border border-[#ccc] rounded outline-none font-bold text-center text-lg focus:border-[#333] focus:bg-white transition-colors" placeholder="정답 입력">
            </div>
            <div class="bg-[#f1f3f4] border-t border-[#ccc] px-4 py-3 text-right flex justify-end gap-2">
                <button onclick="closeGuessModal()" class="bg-white border border-[#ccc] px-5 py-2 font-bold hover:bg-gray-50">취소</button>
                <button onclick="submitGuess()" class="bg-[#333] text-white border border-[#333] px-5 py-2 font-bold hover:bg-black shadow-md">도전!</button>
            </div>
        </div>
    </div>

    <div id="screen-game" class="hidden flex-col h-full w-full">
        
        <div class="bg-[#f8f9fa] border-b border-[#e2e3e3] px-2 md:px-4 py-2 flex items-center gap-2 md:gap-3 flex-shrink-0">
            <div class="w-7 h-7 md:w-8 md:h-8 bg-[#5f6368] text-white flex items-center justify-center font-bold text-base md:text-lg cursor-pointer hover:opacity-90 flex-shrink-0" title="로비로 이동" onclick="goToLobby()">S</div>
            <div class="flex-1 overflow-hidden whitespace-nowrap">
                <div class="text-xs md:text-sm text-[#333] font-medium truncate" id="room-info-display">Loading...</div>
                <div class="text-[10px] md:text-[11px] text-[#5f6368] flex gap-2 md:gap-4 mt-0.5 md:mt-1">
                    <span class="hover:bg-[#e8eaed] px-1 rounded cursor-pointer hidden md:inline">파일</span>
                    <span class="hover:bg-[#e8eaed] px-1 rounded cursor-pointer hidden md:inline">수정</span>
                    <span class="hover:bg-[#e8eaed] px-1 rounded cursor-pointer text-[#333]" onclick="openRoomManage()">도구(관리)</span>
                    <span class="hover:bg-[#e8eaed] px-1 rounded cursor-pointer font-bold text-[#5f6368]" onclick="openHelpModal()">도움말(Help)</span>
                </div>
            </div>
            <div class="hidden md:flex items-center gap-2 border-r border-[#ccc] pr-4 mr-2">
                <div id="player-list" class="flex gap-1"></div>
            </div>
            <button onclick="handleShareRoom()" class="bg-[#f1f3f4] text-[#333] px-3 md:px-4 py-1.5 text-[10px] md:text-[11px] font-bold border border-[#ccc] hover:bg-[#e8eaed] whitespace-nowrap flex-shrink-0">공유</button>
        </div>

        <div class="flex items-center border-b border-[#e2e3e3] bg-white flex-shrink-0 text-xs md:text-sm h-8 md:h-10">
            <div class="w-8 md:w-10 h-full flex justify-center items-center text-[#5f6368] font-serif italic border-r border-[#e2e3e3] bg-[#f8f9fa] flex-shrink-0">fx</div>
            <div id="display-theme" class="flex-1 px-3 text-[#333] font-mono font-bold outline-none truncate transition-colors duration-300">데이터 동기화 대기 중...</div>
        </div>

        <div class="flex-1 flex flex-col md:flex-row overflow-hidden bg-white">
            
            <div class="flex-1 flex flex-col md:border-r border-[#e2e3e3] overflow-y-auto bg-white relative">
                
                <div class="flex w-full bg-[#f8f9fa] border-b border-[#e2e3e3] text-[10px] md:text-[11px] text-[#5f6368] font-medium h-7 md:h-8">
                    <div class="w-[10%] md:w-[10%] cell-border flex justify-center items-center flex-shrink-0">#</div>
                    <div class="w-[35%] md:w-[30%] cell-border px-1 flex justify-center items-center">참여자 (Player)</div>
                    <div class="w-[35%] md:w-[40%] cell-border px-1 flex justify-center items-center text-[#333] font-bold">제시어 (Keyword)</div>
                    <div class="flex-1 cell-border px-1 flex justify-center items-center">상태 (Status)</div>
                </div>
                
                <div id="player-board-container" class="flex-col w-full text-[11px] md:text-[13px]"></div>
            </div>

            <div class="h-[45%] md:h-full w-full md:w-80 bg-white flex flex-col flex-shrink-0 border-t md:border-t-0 border-[#e2e3e3] relative">
                <div class="p-1.5 md:p-2 border-b border-[#e2e3e3] bg-[#f8f9fa] text-[10px] md:text-[11px] text-[#5f6368] font-medium flex justify-between items-center">
                    <span>메모 이력 (Log)</span>
                </div>
                <div id="chat-messages" class="flex-1 overflow-y-auto p-2 md:p-3 space-y-2 bg-white text-[10px] md:text-[11px]"></div>
                <div class="p-1.5 md:p-2 border-t border-[#e2e3e3] bg-[#f8f9fa]">
                    <form onsubmit="handleChatSubmit(event)" class="flex gap-1.5 md:gap-2 m-0">
                        <input type="text" id="chat-input" placeholder="메모 추가..." autocomplete="off" class="flex-1 px-2 py-1 bg-white border border-[#ccc] outline-none focus:border-[#333] text-[10px] md:text-[11px]">
                        <button type="submit" class="bg-[#f1f3f4] text-[#333] border border-[#ccc] px-2 md:px-3 py-1 text-[10px] md:text-[11px] hover:bg-[#e8eaed] whitespace-nowrap font-bold">입력</button>
                    </form>
                </div>

                <div id="chat-blind" class="hidden absolute inset-0 bg-white/95 z-50 flex flex-col items-center justify-center p-4 text-center border-l border-[#e2e3e3]">
                    <span class="text-3xl mb-2">🔒</span>
                    <span class="text-[#333] font-black text-sm mb-1">통신 차단됨</span>
                    <span class="text-[#5f6368] text-[11px] break-keep">다른 플레이어들이 당신의 제시어를 정하고 있습니다.</span>
                </div>
            </div>
        </div>

        <div class="bg-[#f8f9fa] border-t border-[#e2e3e3] flex items-center justify-between px-2 flex-shrink-0 text-[10px] md:text-[11px] overflow-x-auto no-scrollbar" style="padding-bottom: env(safe-area-inset-bottom);">
            <div class="flex items-center flex-shrink-0">
                <div class="px-2 py-1.5 text-[#5f6368] border-r border-[#e2e3e3] font-bold cursor-pointer hover:bg-[#e8eaed]" title="로비로 나가기" onclick="goToLobby()">◀</div>
                <div class="bg-white text-[#333] font-bold px-3 md:px-4 py-1.5 border-r border-t border-l border-[#e2e3e3] shadow-[0_-1px_0_#333] cursor-pointer whitespace-nowrap">WHOAMI_DB</div>
                <div class="text-[#5f6368] px-3 md:px-4 py-1.5 hover:bg-[#e8eaed] cursor-pointer whitespace-nowrap" onclick="confirmRestartGame()">초기화</div>
            </div>
            
            <div class="flex items-center gap-1.5 md:gap-2 pr-1 md:pr-2 py-1.5 flex-shrink-0">
                <button id="btn-ready" onclick="toggleReady()" class="hidden bg-white text-[#333] border border-[#ccc] px-3 md:px-4 py-1 hover:bg-[#f1f3f4] transition-colors whitespace-nowrap font-bold shadow-sm">참가 (Ready)</button>
                <button id="btn-start" onclick="startGame()" class="hidden bg-[#333] text-white border border-[#333] px-3 md:px-4 py-1 hover:bg-black transition-colors whitespace-nowrap font-bold shadow-sm">매크로 실행 (Start)</button>
                
                <div id="assign-controls" class="hidden flex items-center gap-1.5">
                    <input type="text" id="assign-input" placeholder="타겟의 제시어 입력" class="w-32 md:w-40 px-2 py-1 bg-white border border-[#ccc] outline-none focus:border-[#333]">
                    <button onclick="submitKeyword()" class="bg-[#5f6368] text-white border border-[#5f6368] px-3 py-1 hover:bg-[#333] transition-colors font-bold whitespace-nowrap shadow-sm">제시어 확정</button>
                </div>

                <button id="btn-guess" onclick="openGuessModal()" class="hidden bg-white text-[#333] border border-[#ccc] px-3 md:px-4 py-1 hover:bg-[#f1f3f4] transition-colors whitespace-nowrap font-black shadow-sm">🎯 정답 맞히기</button>
                <button id="btn-end-turn" onclick="endTurn()" class="hidden bg-[#333] text-white border border-[#333] px-3 md:px-4 py-1 hover:bg-black disabled:opacity-40 disabled:bg-[#f1f3f4] disabled:text-[#999] disabled:border-[#ccc] transition-colors whitespace-nowrap font-bold shadow-sm">질문 완료 (턴 넘기기)</button>
            </div>
        </div>
    </div>

    <div id="loading" class="hidden fixed inset-0 bg-white/70 flex items-center justify-center z-[400]"><span class="text-[#333] font-bold text-xs bg-white border border-[#ccc] px-4 py-2 shadow-sm">데이터 통신 중...</span></div>

    <script>
        const supabaseClient = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        const COLORS = ["#777777", "#555555", "#333333", "#444444", "#666666", "#222222", "#888888", "#999999", "#aaaaaa", "#bbbbbb"]; // 유저 원색 레이블도 연한 무채색으로 정돈
        const state = { user: null, roomCode: null, roomData: null, players: [], myPlayerInfo: null };

        function showToast(msg) { const toast = document.getElementById('toast'); toast.innerText = msg; toast.classList.remove('opacity-0', 'translate-y-5'); setTimeout(() => toast.classList.add('opacity-0', 'translate-y-5'), 2000); }
        function showLoading(show) { document.getElementById('loading').classList.toggle('hidden', !show); }
        function goToLobby() { window.location.href = 'index.html'; }

        function openHelpModal() { document.getElementById('modal-help').classList.remove('hidden'); }
        function closeHelpModal() { document.getElementById('modal-help').classList.add('hidden'); }
        function openGuessModal() { document.getElementById('guessInput').value = ""; document.getElementById('modal-guess').classList.remove('hidden'); setTimeout(() => document.getElementById('guessInput').focus(), 100); }
        function closeGuessModal() { document.getElementById('modal-guess').classList.add('hidden'); }

        function parseBoard(raw) {
            const defaultBoard = { keyword: "", guessed: false, spectator: false };
            if (!raw) return defaultBoard;
            if (typeof raw === 'object' && !Array.isArray(raw)) return Object.assign({}, defaultBoard, raw);
            if (typeof raw === 'string') { 
                try { 
                    let parsed = JSON.parse(raw); 
                    return (typeof parsed === 'object' && parsed !== null && !Array.isArray(parsed)) ? Object.assign({}, defaultBoard, parsed) : defaultBoard; 
                } catch(e) { return defaultBoard; } 
            }
            return defaultBoard;
        }

        window.onload = async () => {
            const urlParams = new URLSearchParams(window.location.search);
            state.roomCode = urlParams.get('code');
            if (!state.roomCode) return goToLobby();

            showLoading(true);
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) { alert("로그인이 필요합니다."); return goToLobby(); }
            state.user = session.user;

            const { data: room } = await supabaseClient.from('game_rooms').select('*').eq('room_code', state.roomCode).single();
            if (!room) { alert("존재하지 않는 데이터입니다."); return goToLobby(); }

            const { data: existingPlayer } = await supabaseClient.from('game_players').select('*').eq('room_code', state.roomCode).eq('user_id', state.user.id).single();
            showLoading(false);

            if (existingPlayer) {
                if (existingPlayer.is_active === false) await supabaseClient.from('game_players').update({ is_active: true }).eq('room_code', state.roomCode).eq('user_id', state.user.id);
                enterGame();
            } else {
                document.getElementById('screen-color').classList.remove('hidden'); document.getElementById('screen-color').classList.add('flex');
                const { data: taken } = await supabaseClient.from('game_players').select('color').eq('room_code', state.roomCode).eq('is_active', true);
                const takenColors = taken ? taken.map(p => p.color) : [];
                const grid = document.getElementById('color-grid');
                grid.innerHTML = COLORS.map(c => `<button onclick="${takenColors.includes(c) ? '' : `selectColor('${c}')`}" class="w-full aspect-square border border-[#ccc] transition-all ${takenColors.includes(c) ? 'opacity-20 cursor-not-allowed' : 'hover:border-[#333] hover:shadow-inner'}" style="background-color: ${c}"></button>`).join('');
            }
        };

        async function selectColor(color) {
            showLoading(true);
            const initBoard = JSON.stringify({ keyword: "", guessed: false, spectator: false });
            const { error } = await supabaseClient.from('game_players').insert([{ room_code: state.roomCode, user_id: state.user.id, user_name: state.user.user_metadata.display_name, color: color, is_active: true, board_state: initBoard }]);
            showLoading(false);
            if(error) return showToast("오류 발생");
            document.getElementById('screen-color').classList.add('hidden'); document.getElementById('screen-color').classList.remove('flex');
            enterGame();
        }

        async function enterGame() {
            document.getElementById('screen-game').classList.remove('hidden'); document.getElementById('screen-game').classList.add('flex');
            try {
                supabaseClient.channel('room_' + state.roomCode)
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'game_rooms', filter: `room_code=eq.${state.roomCode}` }, refreshGame)
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'game_players', filter: `room_code=eq.${state.roomCode}` }, refreshGame)
                    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'game_chat', filter: `room_code=eq.${state.roomCode}` }, (p) => appendChatMessage(p.new))
                    .subscribe();
            } catch(e) { console.error(e); }
            await loadChatHistory(state.roomCode); 
            refreshGame();
        }

        async function loadChatHistory(code) {
            try {
                const { data } = await supabaseClient.from('game_chat').select('*').eq('room_code', code).order('id', { ascending: true }).catch(() => ({ data: [] }));
                const box = document.getElementById('chat-messages'); box.innerHTML = '';
                const chatData = data || [];
                chatData.forEach(c => appendChatMessage(c));
            } catch (e) { console.error("Chat load error", e); }
        }

        async function refreshGame() {
            try {
                const { data: room } = await supabaseClient.from('game_rooms').select('*').eq('room_code', state.roomCode).single();
                if(!room) { alert("연결이 끊어졌습니다."); return goToLobby(); }
                
                // 💡 픽스 1: 턴 꼬임 방지를 위해 무조건 들어온 순서인 'id' 정렬로 가속 정렬 고정!
                const { data: players } = await supabaseClient.from('game_players').select('*').eq('room_code', state.roomCode).eq('is_active', true).order('id', { ascending: true });
                const activePlayers = players || [];
                
                const me = activePlayers.find(p => p.user_id === state.user.id);
                if (!me) { alert("세션에서 제외되었습니다."); supabaseClient.removeAllChannels(); return goToLobby(); }

                state.roomData = room; state.players = activePlayers; state.myPlayerInfo = me;
                renderUI();
            } catch (err) {
                console.error("데이터 동기화 실패:", err);
            }
        }

        function renderUI() {
            if (!state.roomData || !state.players) return; 
            
            document.getElementById('room-info-display').innerText = `[공유] ${state.roomData.room_name} (ID: ${state.roomCode})`;
            
            let gs = { stage: 'assign', assignIdx: 0, turnIdx: 0 };
            if (state.roomData.status !== 'waiting') { 
                try { gs = JSON.parse(state.roomData.current_theme || "{}"); } catch(e) {} 
            }

            // 고정된 입장 순서(`id`) 기반으로 타겟과 질문 턴 산정
            const playingPlayers = state.players.filter(p => !parseBoard(p.board_state).spectator);
            const pLen = Math.max(playingPlayers.length, 1);
            
            const activePlayer = gs.stage === 'play' ? playingPlayers[gs.turnIdx % pLen] : null;
            const assignTargetPlayer = gs.stage === 'assign' ? playingPlayers[gs.assignIdx % pLen] : null;
            
            const isMyTurn = (state.roomData.status === 'playing' && gs.stage === 'play') && (activePlayer?.user_id === state.user.id);
            const isMyAssignTurn = (state.roomData.status === 'playing' && gs.stage === 'assign') && (assignTargetPlayer?.user_id === state.user.id);
            const iAmSpectator = parseBoard(state.myPlayerInfo.board_state).spectator;

            let displayMsg = "#WAITING_FOR_MACRO";
            let displayThemeEl = document.getElementById('display-theme');
            displayThemeEl.className = "flex-1 px-3 font-mono font-bold outline-none truncate text-[#333]"; 
            
            if (state.roomData.status === 'waiting') {
                displayMsg = "=READY_CHECK(Action: '참가 준비를 완료하세요')";
            } else if (state.roomData.status === 'revealed') {
                displayMsg = "=RESULT(Status: 'GAME_OVER', Msg: '모든 플레이어가 정답을 맞혔습니다!')";
            } else if (state.roomData.status === 'playing') {
                if (gs.stage === 'assign') {
                    displayMsg = `=ASSIGN_KEYWORD(Target: "${assignTargetPlayer?.user_name || '알 수 없음'}")`;
                    if (!iAmSpectator && isMyAssignTurn) displayThemeEl.classList.add('bg-[#f1f3f4]'); 
                } else if (gs.stage === 'play') {
                    displayMsg = `=TURN(Active: "${activePlayer?.user_name || '알 수 없음'}", Status: "질문 진행 중")`;
                    if (isMyTurn) displayThemeEl.classList.add('bg-[#f1f3f4]');
                }
            }
            displayThemeEl.innerText = displayMsg;

            let boardHTML = "";
            state.players.forEach((p, idx) => {
                let pData = parseBoard(p.board_state);
                let rowBg = "bg-white";
                if (gs.stage === 'play' && activePlayer?.user_id === p.user_id) rowBg = "bg-[#f1f3f4]";
                if (gs.stage === 'assign' && assignTargetPlayer?.user_id === p.user_id) rowBg = "bg-[#f1f3f4]";
                
                let nameHtml = `<div class="flex items-center gap-1.5 truncate"><div class="w-1.5 h-1.5 rounded-full flex-shrink-0" style="background-color: #555"></div><span class="truncate font-bold ${p.user_id === state.user.id ? 'text-black underline' : 'text-[#333]'}${pData.spectator ? ' opacity-40' : ''}">${p.user_name}</span></div>`;

                let keywordHtml = "";
                let statusHtml = "";

                if (state.roomData.status === 'waiting') {
                    statusHtml = p.is_ready ? `<span class="text-[#333] font-bold">준비 완료</span>` : `<span class="text-[#777]">대기 중</span>`;
                    keywordHtml = `<span class="text-[#ccc] italic">-</span>`;
                } else if (pData.spectator) {
                    statusHtml = `<span class="text-[#777] italic">관전 중</span>`;
                    keywordHtml = `<span class="text-[#ccc] italic">-</span>`;
                } else if (pData.guessed || state.roomData.status === 'revealed') {
                    statusHtml = `<span class="text-[#333] font-bold">✔ 정답 판명</span>`;
                    keywordHtml = `<span class="text-[#333] font-black tracking-widest bg-[#f1f3f4] px-2 py-0.5 rounded shadow-sm border border-gray-300">${pData.keyword}</span>`;
                } else {
                    if (gs.stage === 'assign') {
                        statusHtml = (assignTargetPlayer?.user_id === p.user_id) ? `<span class="text-[#333] font-bold animate-pulse">제시어 입력 중...</span>` : `<span class="text-[#777]">대기</span>`;
                    } else if (gs.stage === 'play') {
                        statusHtml = (activePlayer?.user_id === p.user_id) ? `<span class="text-[#333] font-black">▶ 질문 중</span>` : `<span class="text-[#777]">고민 중</span>`;
                    }
                    
                    if (p.user_id === state.user.id) {
                        keywordHtml = `<span class="text-[#333] font-bold">?</span>`; 
                    } else {
                        keywordHtml = `
                        <div class="relative flex items-center justify-center w-full h-full cursor-pointer group" onpointerdown="this.children[1].classList.remove('hidden'); this.children[0].classList.add('hidden')" onpointerup="this.children[1].classList.add('hidden'); this.children[0].classList.remove('hidden')" onpointerleave="this.children[1].classList.add('hidden'); this.children[0].classList.remove('hidden')" oncontextmenu="event.preventDefault();" style="touch-action: none; -webkit-user-select: none; user-select: none;">
                            <span class="text-[#5f6368] bg-[#f1f3f4] px-3 py-1 text-[10px] md:text-xs font-bold border border-gray-300 group-hover:bg-[#e8eaed] transition-colors rounded-sm">조회</span>
                            <span class="hidden text-[#333] font-black text-sm md:text-base tracking-wider absolute inset-0 bg-white flex items-center justify-center border border-[#333] z-10 shadow-md">${pData.keyword || '(미정)'}</span>
                        </div>`;
                    }
                }

                boardHTML += `
                <div class="flex w-full row-hover h-10 md:h-12 border-b border-[#e2e3e3] last:border-0 box-border overflow-hidden ${rowBg} transition-colors">
                    <div class="w-[10%] md:w-[10%] cell-border fixed-cell text-[#5f6368] flex-shrink-0 bg-[#f8f9fa]">${idx+1}</div>
                    <div class="w-[35%] md:w-[30%] cell-border fixed-cell flex-shrink-0 px-2 flex justify-start">${nameHtml}</div>
                    <div class="w-[35%] md:w-[40%] cell-border fixed-cell flex-shrink-0 px-1 relative">${keywordHtml}</div>
                    <div class="flex-1 cell-border fixed-cell flex-shrink-0 px-1 text-[9px] md:text-[11px] text-center tracking-tighter">${statusHtml}</div>
                </div>`;
            });
            document.getElementById('player-board-container').innerHTML = boardHTML;

            document.getElementById('btn-ready').classList.toggle('hidden', state.roomData.status !== 'waiting');
            const btnReady = document.getElementById('btn-ready');
            btnReady.innerText = state.myPlayerInfo?.is_ready ? "준비 취소" : "참가 (Ready)";
            
            if(state.myPlayerInfo?.is_ready) { 
                btnReady.classList.replace('bg-[#1a73e8]', 'bg-[#f1f3f4]'); btnReady.classList.replace('text-white', 'text-[#333]'); btnReady.classList.replace('border-[#1557b0]', 'border-[#ccc]'); 
            } else { 
                btnReady.classList.replace('bg-[#f1f3f4]', 'bg-[#1a73e8]'); btnReady.classList.replace('text-[#333]', 'text-white'); btnReady.classList.replace('border-[#ccc]', 'border-[#1557b0]'); 
            }

            const btnStart = document.getElementById('btn-start');
            btnStart.classList.toggle('hidden', state.roomData.status !== 'waiting');
            
            if (state.myPlayerInfo?.is_ready) {
                btnStart.disabled = false; btnStart.classList.remove('opacity-40', 'cursor-not-allowed');
            } else {
                btnStart.disabled = true; btnStart.classList.add('opacity-40', 'cursor-not-allowed');
            }

            const showAssign = state.roomData.status === 'playing' && gs.stage === 'assign' && (!isMyAssignTurn || playingPlayers.length === 1);
            document.getElementById('assign-controls').classList.toggle('hidden', !showAssign);
            if (showAssign && assignTargetPlayer) {
                document.getElementById('assign-input').placeholder = `[${assignTargetPlayer.user_name}]의 제시어`;
            }

            const showPlayBtns = state.roomData.status === 'playing' && gs.stage === 'play' && !iAmSpectator;
            const iAmGuessed = parseBoard(state.myPlayerInfo.board_state).guessed;
            
            document.getElementById('btn-guess').classList.toggle('hidden', !showPlayBtns || iAmGuessed);
            document.getElementById('btn-end-turn').classList.toggle('hidden', !showPlayBtns);
            
            const btnEndTurn = document.getElementById('btn-end-turn');
            btnEndTurn.disabled = !isMyTurn;
            btnEndTurn.innerText = isMyTurn ? "질문 완료 (턴 넘기기)" : "상대방 턴 진행중";

            // 내 제시어 턴일 때 채팅 블라인드 완벽 가동
            const chatBlind = document.getElementById('chat-blind');
            if (chatBlind) {
                chatBlind.classList.toggle('hidden', !isMyAssignTurn);
            }
        }

        async function toggleReady() { 
            document.getElementById('btn-ready').disabled = true; 
            await supabaseClient.from('game_players').update({ is_ready: !state.myPlayerInfo.is_ready }).eq('room_code', state.roomCode).eq('user_id', state.user.id); 
            document.getElementById('btn-ready').disabled = false;
        }

        async function startGame() {
            const btnStart = document.getElementById('btn-start'); btnStart.disabled = true; showLoading(true);
            
            // 💡 픽스 2: 시작할 때도 들어온 순서('id')로 정렬하여 인덱스 일치 유도
            const { data: players } = await supabaseClient.from('game_players').select('*').eq('room_code', state.roomCode).eq('is_active', true).order('id', { ascending: true });
            const activePlayers = players || [];
            const readyPlayers = activePlayers.filter(p => p.is_ready);
            
            if (readyPlayers.length < 1) { showLoading(false); btnStart.disabled = false; return showToast("최소 1명 이상의 참가자가 필요합니다."); }

            const me = activePlayers.find(p => p.user_id === state.user.id);
            if (!me || !me.is_ready) { showLoading(false); btnStart.disabled = false; return showToast("본인이 먼저 참가(Ready)를 눌러야 시작할 수 있습니다."); }

            const gs = { stage: 'assign', assignIdx: 0, turnIdx: 0 };
            const initBoard = JSON.stringify({ keyword: "", guessed: false, spectator: false });
            const specBoard = JSON.stringify({ keyword: "", guessed: false, spectator: true });

            const unreadyPlayers = activePlayers.filter(p => !p.is_ready);
            for(let p of unreadyPlayers) { await supabaseClient.from('game_players').update({ board_state: specBoard, is_ready: false }).eq('room_code', state.roomCode).eq('user_id', p.user_id); }
            for(let p of readyPlayers) { await supabaseClient.from('game_players').update({ board_state: initBoard, is_ready: false }).eq('room_code', state.roomCode).eq('user_id', p.user_id); }

            await supabaseClient.from('game_rooms').update({ current_theme: JSON.stringify(gs), status: 'playing' }).eq('room_code', state.roomCode);
            showLoading(false); btnStart.disabled = false;
        }

        async function handleChatSubmit(e) {
            e.preventDefault(); const i = document.getElementById('chat-input'); const m = i.value.trim(); if(!m) return; i.value = ""; i.focus();
            
            let prefix = "";
            let gs = { stage: 'assign', assignIdx: 0 };
            try { gs = JSON.parse(state.roomData?.current_theme || "{}"); } catch(e){}
            
            if (state.roomData?.status === 'playing' && gs.stage === 'assign') {
                const playingPlayers = state.players.filter(p => !parseBoard(p.board_state).spectator);
                const pLen = Math.max(playingPlayers.length, 1);
                const targetPlayer = playingPlayers[gs.assignIdx % pLen];
                // 💡 픽스 3: 정확하게 보정된 순서의 플레이어 ID를 태그하여 스포일러 완벽 봉쇄
                if (targetPlayer) prefix = `[SPOIL:${targetPlayer.user_id}]`; 
            }
            
            await supabaseClient.from('game_chat').insert([{ room_code: state.roomCode, user_name: state.user.user_metadata.display_name, color: state.myPlayerInfo?.color || '#333', message: prefix + m }]);
        }

        function appendChatMessage(c) {
            let msg = c.message || ""; // 💡 픽스 4: 공백 또는 에러 메시지 유입 시 렌더링 다운 방지 안전조치
            
            // 💡 픽스 5: 내 타겟 턴일 때 결정되는 방 내역은 렌더링 자체를 통틀어 드롭 (가막해제 후에도 영원히 유출 불가)
            const spoilMatch = msg.match(/^\[SPOIL:(.+?)\]/);
            if (spoilMatch) {
                if (spoilMatch[1] === state.user.id) return; 
                msg = msg.replace(/^\[SPOIL:.+?\]/, ''); 
            }

            const box = document.getElementById('chat-messages'); const isMe = c.user_name === state.user.user_metadata.display_name;
            const isSystem = c.user_name === "SYSTEM";
            const d = document.createElement('div'); d.className = "flex flex-col mb-2";
            
            if (isSystem) {
                d.innerHTML = `<div class="text-[9px] md:text-[10px] font-black text-[#5f6368] mb-0.5 flex justify-center w-full bg-[#f1f3f4] py-1 rounded-sm">${msg}</div>`;
            } else {
                const bubbleStyle = isMe ? 'bg-[#333] text-white rounded-tr-none' : 'bg-white border border-[#ccc] text-[#333] shadow-sm rounded-tl-none border-l-2 border-l-[#5f6368]';
                d.innerHTML = `<div class="text-[9px] md:text-[10px] font-bold text-[#333] mb-0.5 flex items-center gap-1"><div class="w-1.5 h-1.5 rounded-full" style="background-color: ${c.color}"></div>${c.user_name} ${isMe ? '<span class="text-[#9aa0a6] font-normal">(나)</span>' : ''}</div><div class="chat-bubble px-2 py-1 ${bubbleStyle} w-fit max-w-[85%] break-all text-xs md:text-sm">${msg}</div>`;
            }
            box.appendChild(d); box.scrollTop = box.scrollHeight;
        }

        async function submitKeyword() {
            const input = document.getElementById('assign-input');
            const kw = input.value.trim();
            if (!kw) return showToast("제시어를 입력하세요.");
            
            showLoading(true);
            const { data: room } = await supabaseClient.from('game_rooms').select('current_theme').eq('room_code', state.roomCode).single();
            let gs = JSON.parse(room.current_theme || "{}");
            
            const playingPlayers = state.players.filter(p => !parseBoard(p.board_state).spectator);
            const pLen = Math.max(playingPlayers.length, 1);
            const targetPlayer = playingPlayers[gs.assignIdx % pLen]; 
            
            if (targetPlayer) {
                let pBoard = { keyword: kw, guessed: false, spectator: false };
                await supabaseClient.from('game_players').update({ board_state: JSON.stringify(pBoard) }).eq('room_code', state.roomCode).eq('user_id', targetPlayer.user_id);
                await supabaseClient.from('game_chat').insert([{ room_code: state.roomCode, user_name: "SYSTEM", color: "#ccc", message: `[${targetPlayer.user_name}]의 제시어가 등록되었습니다.` }]);
            }

            gs.assignIdx += 1;
            input.value = "";
            
            if (gs.assignIdx >= playingPlayers.length) {
                gs.stage = 'play';
                await supabaseClient.from('game_chat').insert([{ room_code: state.roomCode, user_name: "SYSTEM", color: "#ccc", message: `🏁 모든 제시어가 세팅되었습니다! 질문을 시작하세요.` }]);
            }
            
            await supabaseClient.from('game_rooms').update({ current_theme: JSON.stringify(gs) }).eq('room_code', state.roomCode);
            showLoading(false);
        }

        async function endTurn() {
            showLoading(true);
            const { data: room } = await supabaseClient.from('game_rooms').select('current_theme').eq('room_code', state.roomCode).single();
            let gs = JSON.parse(room.current_theme || "{}");
            
            const playingPlayers = state.players.filter(p => !parseBoard(p.board_state).spectator);
            const pLen = Math.max(playingPlayers.length, 1);
            
            do {
                gs.turnIdx += 1;
                let nextPlayer = playingPlayers[gs.turnIdx % pLen];
                if (!nextPlayer) break; 
                let npBoard = parseBoard(nextPlayer.board_state);
                if (!npBoard.guessed) break; 
            } while (gs.turnIdx % pLen !== JSON.parse(room.current_theme || "{}").turnIdx % pLen); 

            await supabaseClient.from('game_rooms').update({ current_theme: JSON.stringify(gs) }).eq('room_code', state.roomCode);
            showLoading(false);
        }

        async function submitGuess() {
            const input = document.getElementById('guessInput');
            const ans = input.value.trim();
            if (!ans) return;

            showLoading(true);
            let myBoard = parseBoard(state.myPlayerInfo.board_state);
            
            const isCorrect = myBoard.keyword.replace(/\s/g, '').toLowerCase() === ans.replace(/\s/g, '').toLowerCase();
            
            if (isCorrect) {
                myBoard.guessed = true;
                await supabaseClient.from('game_players').update({ board_state: JSON.stringify(myBoard) }).eq('room_code', state.roomCode).eq('user_id', state.user.id);
                await supabaseClient.from('game_chat').insert([{ room_code: state.roomCode, user_name: "SYSTEM", color: "#0f9d58", message: `🎉 [${state.myPlayerInfo.user_name}] 정답을 맞혔습니다! (제시어: ${myBoard.keyword})` }]);
                closeGuessModal();
                showToast("정답입니다!");

                const { data: checkPlayers } = await supabaseClient.from('game_players').select('board_state').eq('room_code', state.roomCode).eq('is_active', true);
                const playingChecks = (checkPlayers || []).filter(p => !parseBoard(p.board_state).spectator);
                if (playingChecks.every(p => parseBoard(p.board_state).guessed === true)) {
                    await supabaseClient.from('game_rooms').update({ status: 'revealed' }).eq('room_code', state.roomCode);
                }
            } else {
                await supabaseClient.from('game_chat').insert([{ room_code: state.roomCode, user_name: state.myPlayerInfo.user_name, color: state.myPlayerInfo.color, message: `도전: [${ans}] -> ❌ 땡!` }]);
                closeGuessModal();
                showToast("틀렸습니다! 다시 추리해 보세요.");
            }
            input.value = "";
            showLoading(false);
        }

        function confirmRestartGame() { openConfirmModal("모든 데이터를 초기화하시겠습니까?\n(메모 로그 영구 삭제)", handleRestartGame); }
        async function handleRestartGame() {
            showLoading(true);
            const initBoard = JSON.stringify({ keyword: "", guessed: false, spectator: false });
            await supabaseClient.from('game_rooms').update({ status: 'waiting', current_theme: '' }).eq('room_code', state.roomCode);
            await supabaseClient.from('game_players').update({ board_state: initBoard, is_ready: false }).eq('room_code', state.roomCode);
            await supabaseClient.from('game_chat').delete().eq('room_code', state.roomCode);
            document.getElementById('chat-messages').innerHTML = ''; showLoading(false); showToast("초기화 완료");
        }

        function openMemberManage() { closeRoomManage(); const list = document.getElementById('member-manage-list'); list.innerHTML = state.players.map(p => `<div class="flex justify-between items-center py-2 border-b border-[#e2e3e3] last:border-0"><div class="flex items-center gap-2"><div class="w-2 h-2 rounded-full" style="background-color: ${p.color}"></div><span class="text-[#333] font-medium">${p.user_name}</span></div>${p.user_id !== state.user.id ? `<button onclick="confirmKickMember('${p.user_id}', '${p.user_name}')" class="text-xs border border-[#ccc] px-2 py-1 hover:bg-[#f1f3f4]">제외</button>` : `<span class="text-xs text-[#9aa0a6]">관리자</span>`}</div>`).join(''); document.getElementById('modal-member-list').classList.remove('hidden'); }
        function closeMemberManage() { document.getElementById('modal-member-list').classList.add('hidden'); }
        function confirmKickMember(id, name) { openConfirmModal(`[${name}] 레코드를 제외하시겠습니까?\n프로세스가 재시작됩니다.`, () => handleKickMember(id)); }
        async function handleKickMember(id) { showLoading(true); await supabaseClient.from('game_players').update({ is_active: false, is_ready: false, board_state: JSON.stringify({keyword:"", guessed:false, spectator:false}) }).eq('room_code', state.roomCode).eq('user_id', id); await handleRestartGame(); showLoading(false); showToast("제외 완료"); closeMemberManage(); }

        function openRoomManage() { document.getElementById('modal-room-manage').classList.remove('hidden'); }
        function closeRoomManage() { document.getElementById('modal-room-manage').classList.add('hidden'); }
        
        function confirmLeaveRoom() { closeRoomManage(); openConfirmModal("방에서 완전히 나가시겠습니까?\n(진행 중인 프로세스가 초기화됩니다.)", async () => { showLoading(true); await supabaseClient.from('game_players').update({ is_active: false, is_ready: false, board_state: JSON.stringify({keyword:"", guessed:false, spectator:false}) }).eq('room_code', state.roomCode).eq('user_id', state.user.id); await handleRestartGame(); goToLobby(); }); }
        
        async function handleShareRoom() { const baseUrl = window.location.href.split('?')[0]; const t = `[공유 워크스페이스]\n시트: ${state.roomData.room_name}\n엑세스 키: ${state.roomCode}\n접속: ${baseUrl}?code=${state.roomCode}`; const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent); try { if (isMobile && navigator.share) { await navigator.share({ text: t }); } else { await copyToClipboard(t); } } catch (e) { await copyToClipboard(t); } closeRoomManage(); }
        async function copyToClipboard(text) { if (navigator.clipboard && window.isSecureContext) { try { await navigator.clipboard.writeText(text); showToast("클립보드에 복사됨"); return; } catch (err) {} } const textArea = document.createElement("textarea"); textArea.value = text; textArea.style.position = "fixed"; textArea.style.left = "-9999px"; textArea.style.top = "0"; document.body.appendChild(textArea); textArea.focus(); textArea.select(); try { document.execCommand('copy'); showToast("클립보드에 복사됨"); } catch (err) { showToast("복사 실패"); } document.body.removeChild(textArea); }
        function openRenameModal() { closeRoomManage(); document.getElementById('renameInput').value = state.roomData.room_name; document.getElementById('modal-rename').classList.remove('hidden'); }
        function closeRenameModal() { document.getElementById('modal-rename').classList.add('hidden'); }
        async function handleRenameRoom() { const n = document.getElementById('renameInput').value.trim(); if(!n) return; await supabaseClient.from('game_rooms').update({ room_name: n }).eq('room_code', state.roomCode); showToast("변경 저장됨"); closeRenameModal(); }
        function confirmDeleteRoom() { closeRoomManage(); openConfirmModal("모든 데이터를 영구 삭제하시겠습니까?", async () => { await supabaseClient.from('game_rooms').delete().eq('room_code', state.roomCode); goToLobby(); }); }
    </script>
</body>
